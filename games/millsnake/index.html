<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MillSnake — Basic Snake Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header class="top">
        <h1>MillSnake</h1>
        <div class="scoreboard">
          <span>Score:</span>
          <span id="score">0</span>
          <span class="sep">•</span>
          <span id="mult" title="Score multiplier">x1.0</span>
          <span class="sep">•</span>
          <span>Money:</span>
          <span id="money">0</span>
        </div>
      </header>

      <button id="shop-toggle" class="shop-toggle" type="button" aria-expanded="false" aria-controls="shop">Shop</button>
      <aside id="shop" class="shop" aria-hidden="true">
        <div class="shop-header">
          <h2>Shop</h2>
          <button id="shop-close" class="shop-close" type="button" aria-label="Close shop">×</button>
        </div>
        <div class="shop-tabs" role="tablist">
          <button id="shop-tab-up" class="shop-tab active" role="tab" aria-selected="true">Upgrades</button>
          <button id="shop-tab-fun" class="shop-tab" role="tab" aria-selected="false">Fun</button>
          <button id="shop-tab-jobs" class="shop-tab" role="tab" aria-selected="false">Jobs</button>
          <div id="shop-tab-indicator" class="shop-tabs-indicator" aria-hidden="true"></div>
        </div>
        <div id="shop-up" class="shop-list shop-section" role="tabpanel" aria-labelledby="shop-tab-up"></div>
        <div id="shop-fun" class="shop-list shop-section hidden" role="tabpanel" aria-labelledby="shop-tab-fun"></div>
        <div id="shop-jobs" class="shop-list shop-section hidden" role="tabpanel" aria-labelledby="shop-tab-jobs"></div>
        <div class="shop-footer">Press B to toggle</div>
      </aside>

      <canvas id="game" aria-label="Snake game canvas" role="img"></canvas>

      <section class="help">
        <p>
          Controls: Arrow Keys or WASD • Space to Pause • Enter to Restart
        </p>
      </section>

      <div id="overlay" class="overlay hidden">
        <div class="panel">
          <h2 id="overlay-title">Paused</h2>
          <p id="overlay-sub">Press Space to resume</p>
          <button id="restart" type="button">Restart (Enter)</button>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
  </html>
